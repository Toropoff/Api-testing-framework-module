name: Regression API Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore regression history from latest regression artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: regression.yml
          workflow_conclusion: success
          branch: main
          name: site-allure-regression
          path: .history/regression
          if_no_artifact_found: warn

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Run regression suite
        run: ./gradlew :test-suites:regression:test -Dframework.profile=stage -Dframework.runLiveTests=true -Dtest.retry.maxRetries=1

      - name: Inject regression history
        if: always()
        run: |
          mkdir -p build/allure-results
          if [ -d ".history/regression/history" ]; then
            cp -R .history/regression/history build/allure-results/history
          fi

      - name: Build Allure report
        if: always()
        run: ./gradlew allureReport

      - name: Package regression site artifact
        if: always()
        run: |
          mkdir -p site/allure/regression
          cp -R build/reports/allure-report/allureReport/. site/allure/regression/

      - name: Upload regression site artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-allure-regression
          path: site/allure/regression
          if-no-files-found: warn
