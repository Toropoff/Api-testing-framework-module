name: Smoke API Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run smoke suite
        run: gradle :tests-smoke:test -Dframework.profile=dev -Dframework.runLiveTests=true
