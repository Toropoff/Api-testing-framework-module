name: Smoke API Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Run smoke suite
        run: ./gradlew :test-suites:smoke:test -Dframework.profile=dev -Dframework.runLiveTests=true

      - name: Build Allure report
        if: always()
        run: ./gradlew allureReport

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-smoke-report
          path: build/reports/allure-report/allureReport
          if-no-files-found: warn

      - name: Publish Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/reports/allure-report/allureReport
          destination_dir: allure/smoke
          keep_files: true
