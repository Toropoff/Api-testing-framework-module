name: Publish Allure Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Run smoke suite
        run: ./gradlew :test-suites:smoke:test -Dframework.profile=dev -Dframework.runLiveTests=true

      - name: Build smoke Allure report
        run: ./gradlew allureReport

      - name: Package smoke site artifact
        run: |
          mkdir -p site/allure/smoke
          cp -R build/reports/allure-report/allureReport/. site/allure/smoke/

      - name: Upload smoke site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-allure-smoke
          path: site/allure/smoke
          if-no-files-found: warn

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Run regression suite
        run: ./gradlew :test-suites:regression:test -Dframework.profile=stage -Dframework.runLiveTests=true -Dtest.retry.maxRetries=1

      - name: Build regression Allure report
        run: ./gradlew allureReport

      - name: Package regression site artifact
        run: |
          mkdir -p site/allure/regression
          cp -R build/reports/allure-report/allureReport/. site/allure/regression/

      - name: Upload regression site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-allure-regression
          path: site/allure/regression
          if-no-files-found: warn

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Run integration suite
        run: ./gradlew :test-suites:integration:test -Dframework.profile=stage -Dframework.runLiveTests=true

      - name: Build integration Allure report
        run: ./gradlew allureReport

      - name: Package integration site artifact
        run: |
          mkdir -p site/allure/integration
          cp -R build/reports/allure-report/allureReport/. site/allure/integration/

      - name: Upload integration site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-allure-integration
          path: site/allure/integration
          if-no-files-found: warn

  publish-pages:
    needs:
      - smoke
      - regression
      - integration
    runs-on: ubuntu-latest
    steps:
      - name: Download smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: site-allure-smoke
          path: site/allure/smoke

      - name: Download regression artifact
        uses: actions/download-artifact@v4
        with:
          name: site-allure-regression
          path: site/allure/regression

      - name: Download integration artifact
        uses: actions/download-artifact@v4
        with:
          name: site-allure-integration
          path: site/allure/integration

      - name: Create root landing page
        run: |
          mkdir -p site
          cat <<'HTML' > site/index.html
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>API Test Reports</title>
          </head>
          <body>
            <h1>Allure reports</h1>
            <ul>
              <li><a href="./allure/smoke/">Smoke</a></li>
              <li><a href="./allure/regression/">Regression</a></li>
              <li><a href="./allure/integration/">Integration</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: publish-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
